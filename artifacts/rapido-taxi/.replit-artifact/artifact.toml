kind = "web"
previewPath = "/"
title = "Rapido Bike Taxi"
version = "1.0.0"
id = "artifacts/rapido-taxi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26012

[services.development]
run = "pnpm --filter @workspace/rapido-taxi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rapido-taxi", "run", "build" ]
publicDir = "artifacts/rapido-taxi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26012"
BASE_PATH = "/"
